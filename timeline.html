<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fest Event Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .font-oswald { font-family: 'Oswald', sans-serif; }

        ::-webkit-scrollbar { height: 12px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 8px; border: 2px solid #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: #ffb703; }
    </style>
</head>
<body class="bg-[#1a1a1a] min-h-screen flex flex-col font-sans antialiased text-white">

<h1 class="font-oswald text-5xl md:text-7xl font-bold tracking-wider uppercase text-center w-full mt-16 mb-8">
    Timeline
</h1>

<div class="w-full overflow-x-auto pb-10">

    <div class="relative min-w-[1600px] mx-auto py-40 px-16">

        <div class="absolute left-16 right-16 h-1 bg-[#ffb703] top-1/2 -translate-y-1/2 z-0"></div>

        <div id="timeline-container" class="flex justify-between items-center w-full relative z-10">
        </div>

    </div>
</div>

<script>
    const eventsData = [
        { title: 'Opening Ceremony', desc: 'Inspiring keynotes and launch.', time: '11:00 AM - 12:30 PM', day: 'Day 1', date: '2026-03-07T11:00:00' },
        { title: 'Ideathon', desc: 'Develop sustainable scalable solutions.', time: '12:00 PM - 05:00 PM', day: 'Day 1', date: '2026-03-07T12:00:00' },
        { title: 'Case Comp', desc: 'Business case with twists.', time: '12:00 PM - 05:00 PM', day: 'Day 1', date: '2026-03-07T12:05:00' },
        { title: 'Fake Pitchathon', desc: 'Parody entrepreneurship pitch competition.', time: '02:00 PM - 06:00 PM', day: 'Day 1', date: '2026-03-07T14:00:00' },
        { title: 'Uxelix', desc: 'Fix real-world UX failures.', time: '12:00 PM - 06:00 PM', day: 'Day 2', date: '2026-03-08T12:00:00' },
        { title: 'B Plan Comp', desc: 'Rigorous business plan competition.', time: '12:00 PM - 05:00 PM', day: 'Day 2', date: '2026-03-08T12:05:00' },
        { title: 'Vichaar To Venture', desc: 'High-intensity VC simulation.', time: '02:00 PM - 05:00 PM', day: 'Day 2', date: '2026-03-08T14:00:00' },
        { title: 'Bridge The Gap', desc: 'Build load-bearing structures.', time: '02:00 PM - 06:00 PM', day: 'Day 2', date: '2026-03-08T14:05:00' },
        { title: 'Closing Ceremony', desc: 'Awards and speaker session.', time: '06:00 PM Onwards', day: 'Day 2', date: '2026-03-08T18:00:00' }
    ];

    function renderTimeline() {
        const container = document.getElementById('timeline-container');
        const now = new Date();

        let activeIndex = -1;
        for (let i = eventsData.length - 1; i >= 0; i--) {
            if (new Date(eventsData[i].date) <= now) {
                activeIndex = i;
                break;
            }
        }
        if (activeIndex === -1) activeIndex = 0;

        let htmlContent = '';

        eventsData.forEach((event, index) => {
            const isCurrent = index === activeIndex;
            const isLabelBottom = index % 2 === 0;

            const labelYClass = isLabelBottom ? 'top-10' : 'bottom-10';
            const tooltipYClass = isLabelBottom ? 'bottom-8' : 'top-8';

            const tooltipArrowClass = isLabelBottom
                ? "after:top-full after:border-t-gray-800 translate-y-3 group-hover:translate-y-0"
                : "after:bottom-full after:border-b-gray-800 -translate-y-3 group-hover:translate-y-0";

            let dotHtml = '';
            let labelHtml = '';

            if (isCurrent) {
                dotHtml = `
                        <div class="w-7 h-7 rounded-full border-[3px] border-[#ffb703] bg-[#1a1a1a] absolute z-20 flex items-center justify-center shadow-[0_0_15px_rgba(255,183,3,0.5)]">
                            <div class="w-0 h-0 border-t-[4px] border-t-transparent border-r-[5px] border-r-[#ffb703] border-b-[4px] border-b-transparent mr-0.5"></div>
                        </div>`;

                labelHtml = `
                        <div class="absolute ${labelYClass} left-1/2 -translate-x-1/2 whitespace-nowrap bg-[#ffb703] text-black px-4 py-1.5 rounded-md font-oswald text-lg font-bold uppercase tracking-wide transition-transform duration-300 group-hover:scale-110 z-10 origin-center">
                            ${event.title}
                        </div>`;
            } else {
                dotHtml = `<div class="w-3.5 h-3.5 bg-[#ffb703] rounded-full absolute z-20"></div>`;

                labelHtml = `
                        <div class="absolute ${labelYClass} left-1/2 -translate-x-1/2 whitespace-nowrap text-white font-oswald text-lg font-bold uppercase tracking-wide transition-transform duration-300 group-hover:scale-110 z-10 origin-center">
                            ${event.title}
                        </div>`;
            }

            htmlContent += `
                    <div class="relative flex items-center justify-center group cursor-pointer hover:z-[60] w-10 h-10">
                        ${dotHtml}
                        ${labelHtml}

                        <div class="absolute ${tooltipYClass} left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-all duration-300 w-52 bg-gray-800 text-white rounded-lg p-3 shadow-xl z-[100] pointer-events-none text-center border border-gray-700 after:content-[''] after:absolute after:left-1/2 after:-translate-x-1/2 after:border-[6px] after:border-transparent ${tooltipArrowClass}">
                            <p class="text-xs text-[#ffb703] font-bold border-b border-gray-600 pb-1.5 mb-1.5 tracking-wider uppercase">${event.day} &bull; ${event.time}</p>
                            <p class="text-xs text-gray-300 leading-relaxed">${event.desc}</p>
                        </div>
                    </div>
                `;
        });

        container.innerHTML = htmlContent;
    }

    renderTimeline();
    setInterval(renderTimeline, 60000);
</script>
</body>
</html>
